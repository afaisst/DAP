<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily AstroPH</title>
    <link rel="stylesheet" href="/styles.css">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true
        },
        startup: {
          pageReady: () => MathJax.startup.defaultPageReady().then(() => {
            window.dispatchEvent(new Event("mathjax-ready"));
          })
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Paper controls">
        <div>
          <p class="eyebrow">arXiv astro-ph daily reader</p>
          <h1>Daily AstroPH</h1>
        </div>

        <div class="controls">
          <label class="field">
            <span>Date</span>
            <span class="date-control">
              <button id="prevDateButton" class="date-step-button" type="button" aria-label="Previous day">&lt;</button>
              <input id="dateInput" type="date">
              <button id="nextDateButton" class="date-step-button" type="button" aria-label="Next day">&gt;</button>
            </span>
          </label>

          <label class="field search-field">
            <span>Search</span>
            <input id="searchInput" type="search" placeholder="Title, author, abstract...">
          </label>
        </div>
      </section>

      <section class="status-row">
        <div id="statusText">Loading papers...</div>
        <button id="refreshButton" type="button" title="Refresh papers">Refresh</button>
      </section>

      <section class="category-filter-panel" aria-label="arXiv classification filters">
        <div class="filter-heading">Classifications</div>
        <div id="categoryFilters" class="category-filters"></div>
      </section>

      <section id="topicList" class="topic-list" aria-live="polite"></section>
    </main>

    <template id="paperTemplate">
      <article class="paper-card">
        <div class="paper-header">
          <div>
            <a class="paper-title" target="_blank" rel="noreferrer"></a>
            <div class="paper-meta-row">
              <p class="paper-meta"></p>
              <button class="favorite-button" type="button" aria-pressed="false" aria-label="Add to favorites" title="Add to favorites">☆</button>
            </div>
          </div>
        </div>

        <div class="paper-actions">
          <details class="share-menu">
            <summary>Share</summary>
            <div class="share-options">
              <button class="copy-link-button" type="button">Copy link</button>
              <a class="email-share-link" target="_blank" rel="noreferrer">Email</a>
              <a class="x-share-link" target="_blank" rel="noreferrer">X</a>
              <a class="facebook-share-link" target="_blank" rel="noreferrer">Facebook</a>
              <a class="linkedin-share-link" target="_blank" rel="noreferrer">LinkedIn</a>
            </div>
          </details>
          <button class="figures-button" type="button">Figures</button>
          <button class="summary-button" type="button">Summary</button>
        </div>

        <div class="authors"></div>

        <details class="abstract-block">
          <summary>Abstract</summary>
          <p></p>
        </details>
      </article>
    </template>

    <dialog id="figureModal" class="figure-modal">
      <div class="figure-modal-shell">
        <div class="figure-modal-header">
          <div>
            <p class="modal-kicker">Paper figures</p>
            <h2 id="figureModalTitle">Figures</h2>
          </div>
          <button id="figureCloseButton" class="icon-button" type="button" aria-label="Close figures">x</button>
        </div>

        <div id="figureStatus" class="figure-status"></div>

        <div id="figureCarousel" class="figure-carousel" hidden>
          <button id="prevFigureButton" class="carousel-button" type="button" aria-label="Previous figure">&lt;</button>
          <figure class="figure-stage">
            <img id="figureImage" alt="">
            <figcaption id="figureCaption"></figcaption>
          </figure>
          <button id="nextFigureButton" class="carousel-button" type="button" aria-label="Next figure">&gt;</button>
        </div>
      </div>
    </dialog>

    <dialog id="summaryModal" class="summary-modal">
      <div class="summary-modal-shell">
        <div class="summary-modal-header">
          <div>
            <p class="modal-kicker">Paper summary</p>
            <h2 id="summaryModalTitle">Summary</h2>
          </div>
          <button id="summaryCloseButton" class="icon-button" type="button" aria-label="Close summary">x</button>
        </div>

        <ul id="summaryList" class="summary-list"></ul>
      </div>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
